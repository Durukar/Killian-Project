name: Build Windows Client

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
    paths:
      - 'apps/killian-client/**'
      - 'crates/killian-protocol/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/windows-client.yml'

jobs:
  build-windows-client:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        run: cargo build --release -p killian-client

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/killian-client.exe dist/killian-client.exe
          Compress-Archive -Path dist/killian-client.exe -DestinationPath dist/killian-client-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: killian-client-windows
          path: dist/killian-client-windows.zip

  release:
    needs: build-windows-client
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: killian-client-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: killian-client-windows.zip
          generate_release_notes: true
